        MiscTab: Ustawienia Inne
        HiddenTab: Ukryte
        GamemodeDescription: Standardowa rozgrywka Among Us. Crewmaci koncza zadania i wyrzucaja zabojcow w glosowaniu, podczas gdy Impostorzy i Neutralni Zabojcy probuja wygrac dla swoich druzyn.
      CaptureTheFlag:
        Name: Capture The Flag
        ButtonText: Ustawienia CTF
        Description: Zmien wszystko na temat CTF tutaj!
        GamemodeDescription: Standardowe Przejmij Flage (Capture The Flag). Gracze musza przejac flage przeciwnej druzyny i wrocic z nia do swojej bazy, aby zdobyc punkty. Jesli zostaniesz trafiony, odrodzisz sie po krotkim czasie. Po odrodzeniu bedziesz rowniez niesmiertelny przez pewien czas, dopoki ten nie minie lub nie zabijesz gracza.
      Colorwars:
        Name: Colorwars
        ButtonText: Ustawienia Colorwars
        Description: Modyfikuj ustawienia Colorwars tutaj!
        GamemodeDescription: Gracze sa podzieleni na druzyny i otrzymuja losowe kolory.\nJesli Tryb Konwersji Koloru jest wlaczony, proba zabicia gracza zmieni jego kolor na twoj. Gra zakonczy sie, gdy pozostanie tylko jeden kolor. Jesli Nagla Smierc (Sudden Death) jest wlaczona, gdy liczba pozostalych kolorow spadnie do liczby ustalonej przez hosta, gracze zaczna sie nawzajem zabijac zamiast konwertowac.\n\nJesli Tryb Konwersji Koloru jest wylaczony, gracze musza zabijac graczy o innych kolorach, aby ich wyeliminowac. Gra zakonczy sie, gdy pozostanie tylko jeden kolor.
      Draft:
        Name: Draft
        ButtonText: Ustawienia Draft
        Description: Modyfikuj ustawienia trybu gry Draft tutaj!
        RoleChoiceCount: Liczba Wyborow Rol
        DraftTitle: Tryb Gry Draft
        RandomOption: Losowe
        PlayerEndTurn: Gracz {0} wybral {1}.
        PlayerSwapChoice: 'Twoja decyzja to teraz: {0}. Pomin glosowanie, aby potwierdzic.{1}'
        PlayerChoiceOptions: >-
          Twoje opcje do wyboru to: {0}

          Zaglosuj na dowolnego gracza, aby zmienic swoj wybor.
        PlayerStartsTurn: Gracz {0} teraz wybiera swoja role. Ma {1} sekund na podjecie decyzji, zanim losowa zostanie wybrana automatycznie.
        GamemodeDescription: To jest wariacja Standardowego Trybu Gry. Kazda rola w Standardowym Trybie Gry moze byc tutaj uzyta.\n\nTen tryb dziala jak standardowy, gdzie najpierw wybiera wszystkie role, ktore powinny zostac przypisane. Jednakze, nie przypisuje ich, a jedynie dodaje je do listy. Na poczatku gry zostanie zwolane spotkanie. Na tym spotkaniu otrzymasz wiadomosc z numerem, twoim wlasnym ID. Kazdy gracz (zaczynajac od najnizszego (1) do liczby graczy) bedzie po kolei wybieral role z losowej puli rol z listy. (Liczba rol do wyboru jest ustalana przez hosta). Mozesz zaglosowac na dowolnego gracza, aby zmienic swoj wybor. Jesli nie podobaja ci sie wylosowane role, zawsze jest dodatkowa opcja nazwana "Losowe" (Random). Ta opcja wybiera dowolna role, ktora jest nadal na liscie i nie zostala jeszcze wybrana. Kiedy jestes zadowolony ze swojego wyboru, mozesz pominac glosowanie, aby go potwierdzic. Jesli nie wybierzesz roli na czas, losowa zostanie wybrana dla ciebie automatycznie. Opcja, ktora wybrales, zostanie ogloszona na czacie. Wszyscy beda wiedziec, ze ta rola zostala wybrana, ale nie beda wiedziec, kto ja otrzymal.\n\nPo tym jak wszyscy gracze wybiora swoje role, spotkanie sie zakonczy i gra rozpocznie sie normalnie.
