      Blurb: <Roles.Debugger.Blurb>
    Duplicator:
      Options:
        DuplicateCooldown: Odnowienie Duplikacji
        DuplicateDuration: Czas Trwania Duplikacji
        SpawnLocation: Miejsce Pojawienia Sie
        CurrentLocation: Obecne
        RandomLocation: Losowe
        KillRadius: Promien Zabijania
        OnlyKillUnalliedPlayers: Zabijaj Tylko Graczy Bez Sojuszu
      RoleName: Duplicator
      Blurb: Sklonuj Siebie
      TrickedCauseOfDeath: Oszukany
      Description: Uzyj przycisku zwierzaka, aby stworzyc swojego klona. Klony sa usuwane podczas spotkania, po smierci lub rozlaczeniu. W zaleznosci od ustawien hosta, klony moga pojawic sie na tobie lub w losowym pokoju. Nie mozesz umieszczac klonow obok ludzi.
      Mutable:
        KillRadius: Kazdy, kto wejdzie w odleglosc {0} od twojego klona, zginie.
      ButtonText: Sklonuj
    GuesserRoleBase:
      GuesserRoleBase: Guesser
      PickedRoleText: Zamierzasz zgadnac gracza {0} jako {1}. Jesli jestes tego pewien, zaglosuj na {0} ponownie, aby sfinalizowac zgadniecie. W przeciwnym razie mozesz wybrac innego gracza glosujac na niego.. LUB wybrac inna role wpisujac /r [nazwaroli]
      PickedPlayerText: Zgadujesz role gracza {0}. Aby zgadnac jego role, wpisz /r [nazwaroli].
      TypeRText: Prosze wpisac /r [nazwaroli], aby zgadnac ta role.
      UnknownRole: Nieznana rola {0}. Mozesz uzyc /perc, aby zobaczyc wszystkie wlaczone role.
      FinishedGuessingText: Potwierdziles swoje zgadniecie. Jesli nie jestes martwy, mozesz teraz glosowac normalnie.
      ErrorCompletingGuess: Blad podczas zgadywania. Mozesz sprobowac zgadnac ponownie.
      GuessAnnouncementMessage: Guesser zgadnal. {0} zginal(ela).
    Genie:
      RoleName: Genie
      Options:
        SuccessChance: Szansa Na Sukces
        MaxGifts: Maksymalnie Zyczen
      WishFailed: Sprobowales zyczyc graczowi {0} modyfikatora {1}, ale sie nie udalo.
      WishGranted: Zyczyles graczowi {0} modyfikatora {1} i odniosles sukces! Otrzymal(a) on(a) ten modyfikator!
      MeetingMessage: Zaglosuj na gracza dwa razy, aby zyczyc mu prezentu! Lub pomin, aby przejsc do normalnego glosowania.
      OutOfWishes: Skonczyly ci sie zyczenia. Nie bedziesz juz mial mozliwosci glosowania na kogos na poczatku spotkania.
      Blurb: Daj Graczom Modyfikatory
      AlreadyWished: Juz zyczyles modyfikatora graczowi {0}. Sprobuj na innym graczu!
      Description: Na spotkaniach masz szanse na wybranie gracza, ktory otrzyma modyfikator. Genie moze dac tylko pozytywne modyfikatory wlaczone przez hosta. Szansa nie jest gwarantowana, moze sie nie udac, a ty stracisz zyczenie. Nie mozesz zyczyc czegos temu samemu graczowi dwa razy.
    Painter:
      GracePeriodText: 'Okres Laski Bez Zabijania: {0}'
      RoleName: Painter
      Blurb: Zabij przeciwne kolory
      Description: Pozbadz sie graczy o innych kolorach. W zaleznosci od ustawien hosta bedziesz zabijal innych graczy lub zmienial ich kolor na swoj.
    Striker:
      ReviveCooldown: 'Odrodzenie Za: {0}'
      GrabbedFlag: Zlapales flage! Przeciwna druzyna ma strzalki do twojej lokalizacji!
      RoleName: Striker
      Blurb: Chron Swojej Flagi
      Description: Uzyj przycisku zwierzaka na fladze przeciwnej druzyny, aby ja podniesc. Wszyscy gracze otrzymaja strzalke wskazujaca na twoja lokalizacje, gdy masz flage.\nW zaleznosci od ustawien hosta, mozesz byc wolniejszy lub nie moc juz wchodzic do wentylacji. Gdy ktos uzyje na tobie przycisku zabojstwa, nie umrzesz. Zamiast tego zostaniesz teleportowany z dala na kilka sekund. Po zakonczeniu odrodzenia, wrocisz do swojej bazy.
      OvertimeTitle: <b>DOGRYWKA</b>
      OvertimeDeathMessage: Host wlaczyl <b>'Nahla Smierc'</b> podczas Dogrywki, co oznacza, ze odradzanie jest wylaczone.
      CaptureButtonText: Przejmij
      TakeButtonText: Wez
      GracePeriodTime: >-
        Niesmiertelnosc Znika

        za: {0}
    Jailor:
      Options:
        JailCooldown: Odnowienie Uwiezienia
        JailorActionButton: Przycisk Akcji Jailora
        MaxExecutionTimes: Maks. Liczba Egzekucji
        JailedPlayersVoteCounts: Glos Uwiezionego Gracza Liczy Sie Dla Jailora
        JailedShowsToAll: Uwieziony Gracz Jest Widoczny Dla Wszystkich
      JailedText: UWIEZIONY
      JailorMessage: Zaglosuj na uwiezionego gracza, aby wykonac na nim egzekucje. W zaleznosci od ustawien, mozesz zginac, jesli jest on crewmate'em. Moze on takze byc zmuszony zaglosowac na te sama osobe co ty. Nikt nie moze zaglosowac na Uwiezionego i nie moze on zginac, chyba ze z twojej reki.
      JailedMessage: Jestes Uwieziony. Nie mozesz glosowac ani zgadywac. Jednak inni gracze rowniez nie moga glosowac na ciebie. Mozesz miec nadzieje, ze Jailor nie wykona na tobie egzekucji.
      PublicExecuteMessage: Uwieziony Gracz ({0}) zostal stracony.
      CannotVote: Nie mozesz zaglosowac na Uwiezionego Gracza!
      RoleName: Jailor
      Blurb: Uwieziaj i Wykonuj Egzekucje Na Zabojcach
      Description: Uzyj przycisku zwierzaka/zabojstwa, aby wybrac gracza do Uwiezienia przed spotkaniem. Na spotkaniu, uwieziony gracz moze byc widoczny dla wszystkich w zaleznosci od ustawien. Uwieziony gracz nie moze glosowac ani uzywac zadnych zdolnosci swojej roli na spotkaniu. Inni gracze rowniez nie moga glosowac na uwiezionego gracza.\nMozesz wykonac na nim egzekucje glosujac na niego. W zaleznosci od ustawien, mozesz popelnic samobojstwo, jesli to crewmate. Masz ograniczona liczbe egzekucji.\nW zaleznosci od ustawien, uwieziony gracz moze "glosowac" z toba, co oznacza, ze jesli ty zaglosujesz na kogos, on bedzie zmuszony zaglosowac na tego samego gracza.
      ButtonText: Uwiez
    Sidekick:
      RoleName: Sidekick
      Blurb: Pomoz Jackalowi zabic Wszystkich
      Description: Jackal moze zrekrutowac gracza na Sidekicka, jesli opcja jest wlaczona. Sidekick straci swoja poprzednia role i umiejetnosci, ale stanie sie sojusznikiem Jackala i zyska mozliwosc zabijania. Sidekick nie bedzie mogl uzywac wentylacji ani sabotowac jak Jackal. Jesli Jackal umrze, Sidekick moze zostac awansowany (jesli opcja jest wlaczona), a ty bedziesz mogl zrekrutowac kolejnego sidekicka.
    Turncoat:
      Options:
        RevealedTurncoatWincon: 'Warunek Wygranej Ujawnionego Turncoata to:'
        RevealedTurncoatAllies: Ujawniony Turncoat Poznaje Sojusznikow
        TurncoatLearns: Turncoat Dowiaduje Sie
        MustBeAlive: Turncoat Musi Zyc Aby Wygrac
        AfterReveal: Po Ujawnieniu
        BeforeReveal: Przed Ujawnieniem
        ImpFaction: Impostor
        NeutralFaction: NK / Undead
        NonCrewFaction: Nie-Crewmate
        Immediately: Natychmiast
        NextMeeting: Nastepne Spotkanie
      NoTarget: Nie mozesz sie ujawnic, dopoki nie wybierzesz celu swoim przyciskiem zabojstwa.
      BetrayReveal: >-
        {0} to {1} i zdecydowal(a) sie zdradzic zaloge!

        Jednakze, {1} przeklal(a) kogos! Jesli {1} zginie, zabierze przekletego gracza ze soba.
      TurncoatHint: Zaglosuj na siebie, aby zdradzic zaloge. Ale pamietaj, ujawni to twoja tozsamosc reszcie zalogi.
      BetrayedTeamPlayers: "Stanales po stronie frakcji '{0}'. Ci gracze sa w tej samej druzynie: {1}"
      NoPlayersOnBetrayedTeam: Nie ma zadnych graczy w druzynie, dla ktorej zdradziles.
      RoleName: Turncoat
      Blurb: Zdradz Zaloge... albo nie
      Description: Turncoat to rola neutralna, ktora poczatkowo jest w druzynie crewmate'ow. Na koniec gry wygraja z zaloga. Jednakze moga zdecydowac sie zdradzic zaloge, glosujac na siebie na spotkaniu. W rezultacie ich rola zostanie ujawniona wszystkim innym. Aby zapobiec natychmiastowemu wyrzuceniu przez zaloge Turncoata, mozesz oznaczyc gracza swoim przyciskiem zabojstwa przed ujawnieniem. Ten gracz zginie, jesli ty zginiesz, wiec mozesz uzyc tej osoby jako zabezpieczenia, aby utrzymac sie przy zyciu. Gracz nawet nie wie, ze jest ofiara, wiec mozesz klamac i obwiniac kogos zupelnie innego (jak Medica).
    Detective:
      Options:
        SuspectsPerCase: Podejrzani Na Sprawe
      RoleName: Detective
      Blurb: Zbieraj info. Rozwiazuj morderstwa.
      Description: Detective to rola crewmate'a, ktory bada ciala, aby znalezc zabojce. Na spotkaniach sa w stanie uzyc wskazowek od zglaszajacego, aby ustalic, gdzie jest cialo i jaka role impostora mial zabojca. W rundach moga badac graczy, aby dowiedziec sie, gdzie byli w czasie, gdy zginela ofiara.
    Viper:
      Options:
        DissolveTime: Czas Rozpuszczania
      RoleName: Viper
      Blurb: Zabijaj, aby rozpuszczac ciala
      Description: Viper to rola Impostora, ktora rozpuszcza ciala graczy po ich zabiciu. Gdy uplynie okreslony czas, cialo calkowicie zniknie i nie bedzie mozna go juz zglosic. Sa 3 etapy rozpuszczania, a czas potrzebny do calkowitego znikniecia jest ustalany przez hosta.
    Drafter:
      RoleName: Drafter
      Blurb: Wybierz swoja kolejna role
      Description: Na poczatku gry, Drafter moze wybrac swoja role z puli rol. Ta rola pojawia sie tylko w trybie gry Draft.
